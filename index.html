<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinestezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="home-page">
        
        <header>
            <div class="tree-container">
                <p>Green Loyalty Programi</p>
                <small>Tree Planting Progress</small>
            
                <div id="tree-image-container">
                    <img id="tree-image" src="assets/tree-stages/seed.png" alt="Tree">
                </div>
                <p id="visit-count">11/20 orders placed</p>
            
            </div>
            </header>
        
        <section class="category-wrapper">
            <div class="category-grid">
                <button class="cat-btn main-course" onclick="openMenu('main')">
                    <img src="assets/icons/main-course.png" alt="Main Course">
                
                </button>
        
                <button class="cat-btn beverages" onclick="openMenu('drinks')">
                    <img src="assets/icons/beverages.png" alt="Beverages">
                </button>

                <button class="cat-btn salads" onclick="openMenu('salads')">
                    <img src="assets/icons/salads.png" alt="Salads">
                </button>
                
                <button class="cat-btn desserts" onclick="openMenu('desserts')">
                    <img src="assets/icons/desserts.png" alt="Desserts">
                </button>
                
            </div>
        </section>
        
    </section>
    
    <div id="menu-page" class="detail-container" style="display: none;">
        <div class="menu-header">
            <button onclick="goBack()" class="back-btn">⬅ Back</button>
            <h2 id="category-title">Main Courses</h2>
        </div>
        
        <nav class="filters" id="filters-bar" style="display:none;">
            <label><input type="checkbox" onchange="filterByCategory('vegan')"> Vegan</label>
            <label><input type="checkbox" onchange="filterByCategory('gluten-free')"> Gluten-Free</label>
        </label>
        </nav>

        <div class="card-container">
            <img src="assets/grilled-salmon-card.png" class="main-card-img">

            <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips()">

            <img src="assets/icons/stars.png" class="btn-overlay stars-button">
            
            <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
        </div>

        <div class="card-container">
            <img src="assets/bowl.png" class="main-card-img">

            <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips()">

            <img src="assets/icons/stars.png" class="btn-overlay stars-button">
            
            <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
