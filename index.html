<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaia Bistro - EcoMenu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="tree-container">
            <p>Green Loyalty Program</p>
            <div id="tree-image-container">
                <img id="tree-image" src="assets/tree-stages/seed.png" alt="Tree">
            </div>
            <p id="visit-count">11/20 Orders</p>
            <small>Tree Planting Progress</small>
        </div>
        <h1 class="bistro-name">Gaia Bistro</h1>
    </header>

    <nav class="categories">
        <button onclick="displayMenu('main')">Main Courses</button>
        <button onclick="displayMenu('drinks')">Beverages</button>
        <button onclick="displayMenu('desserts')">Desserts</button>
        <button onclick="displayMenu('salads')">Salads</button>
    </nav>

    <nav class="filters" id="filters-bar" style="display:none;">
        <label><input type="checkbox" onchange="filterByCategory('vegan')"> Vegan</label>
        <label><input type="checkbox" onchange="filterByCategory('gluten-free')"> Gluten-Free</label>
    </label>
    </nav>

    <main id="menu-grid">
        </main>

    <script src="script.js"></script>
</body>
</html>
