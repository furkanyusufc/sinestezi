<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinestezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="tree-container">
            <p>Green Loyalty Programi</p>
            <div id="tree-image-container">
                <img id="tree-image" src="assets/tree-stages/seed.png" alt="Tree">
            </div>
            <p id="visit-count">11/20 Orders</p>
            <small>Tree Planting Progress</small>
        </div>
        <h1 class="bistro-name">Gaia Bistro</h1>
    </header>

    <section class="category-wrapper">
        <div class="category-grid">
            <button class="cat-btn main-course" onclick="displayMenu('main')">
                <span class="icon">🍴</span>
                Main Courses
            </button>
            <button class="cat-btn beverages" onclick="displayMenu('drinks')">
                <span class="icon">🍹</span>
                Beverages
            </button>
            <button class="cat-btn desserts" onclick="displayMenu('desserts')">
                <span class="icon">🍰</span>
                Desserts
            </button>
            <button class="cat-btn salads" onclick="displayMenu('salads')">
                <span class="icon">🥗</span>
                Salads
            </button>
        </div>
    </section>

    <nav class="filters" id="filters-bar" style="display:none;">
        <label><input type="checkbox" onchange="filterByCategory('vegan')"> Vegan</label>
        <label><input type="checkbox" onchange="filterByCategory('gluten-free')"> Gluten-Free</label>
    </label>
    </nav>

    <main id="menu-grid">
        </main>

    <script src="script.js"></script>
</body>
</html>
