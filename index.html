<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinestezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="home-page">
        
        <header>
            <div class="tree-container">
                <p>Green Loyalty Program</p>
                <small>Tree Planting Progress</small>
            
                <div id="tree-image-container">
                    <img id="tree-image" src="assets/tree-stages/empty-pot.png" alt="Tree Progress">
                </div>
                <p id="visit-count">0/20 orders placed</p>
            
            </div>
        </header>
        
        <section class="category-wrapper">
            <div class="category-grid">
                <button class="cat-btn main-course" onclick="openMenu('main')">
                    <img src="assets/icons/main-course.png" alt="Main Course">
                
                </button>
        
                <button class="cat-btn beverages" onclick="openMenu('drinks')">
                    <img src="assets/icons/beverages.png" alt="Beverages">
                </button>

                <button class="cat-btn salads" onclick="openMenu('salads')">
                    <img src="assets/icons/salads.png" alt="Salads">
                </button>
                
                <button class="cat-btn desserts" onclick="openMenu('desserts')">
                    <img src="assets/icons/desserts.png" alt="Desserts">
                </button>
                
            </div>
        </section>
        
    </section>
    
    <div id="menu-page" class="detail-container" style="display: none;">

        <button onclick="goBack()" class="back-btn">
            <img src="assets/back.png" alt="Back">
        </button>
        
        <nav class="filters" id="filters-bar" style="display:none;">
            <div class="filter-item">
                <input type="checkbox" id="vegan-checkbox" onchange="filterByCategory('vegan')">
                <label for="vegan-checkbox" class="filter-btn">
                    <img src="assets/icons/vegan-icon.png" alt="Vegan">
                </label>
            </div>

            <div class="filter-item">
                <input type="checkbox" id="gf-checkbox" onchange="filterByCategory('gluten-free')">
                <label for="gf-checkbox" class="filter-btn">
                    <img src="assets/icons/gf-icon.png" alt="Gluten-Free">
                </label>
            </div>

            <div class="filter-item">
                <input type="checkbox" id="lf-checkbox" onchange="filterByCategory('lactoz-free')">
                <label for="lf-checkbox" class="filter-btn">
                    <img src="assets/icons/lf-icon.png" alt="Lactoz-Free">
                </label>
            </div>
        </nav>
        
        <h2 id="category-title">Main Courses</h2>

        <div id="group-main" class="category-group" style="display:none;">
            
            <div class="card-container gluten-free lactoz-free">
                <img src="assets/grilled-salmon-card.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/salmon-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>
            
            <div class="card-container vegan lactoz-free gluten-free">
                <img src="assets/bowl.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/bowl-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container">
                <img src="assets/beef.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/beef-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container">
                <img src="assets/mushroom.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/mush-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>
        </div>
        
        <div id="group-drinks" class="category-group" style="display:none;">
            <div class="card-container vegan gluten-free lactoz-free">
                <img src="assets/berry.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/tea-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container vegan gluten-free lactoz-free">
                <img src="assets/detox.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/detox-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container vegan gluten-free lactoz-free">
                <img src="assets/lemonade.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/spark-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container gluten-free">
                <img src="assets/milk.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/milk-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>
        </div>

        <div id="group-salads" class="category-group" style="display:none;">
            <div class="card-container">
                <img src="assets/caesar.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/classic-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container vegan gluten-free lactoz-free">
                <img src="assets/kale.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/kale-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container gluten-free">
                <img src="assets/pesto.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/pesto-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container vegan gluten-free lactoz-free">
                <img src="assets/walnut.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/wal-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>
        </div>

        <div id="group-desserts" class="category-group" style="display:none;">
            <div class="card-container vegan gluten-free lactoz-free">
                <img src="assets/buddha.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/avo-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container">
                <img src="assets/cheese.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/classic-cheesecake-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container gluten-free">
                <img src="assets/gf.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/gf-almond-cake-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>

            <div class="card-container vegan gluten-free lactoz-free">
                <img src="assets/sorbet.png" class="main-card-img">

                <img src="assets/icons/chef.png" class="btn-overlay chef-btn" onclick="showChefTips('assets/lemon-tip.png')">

                <img src="assets/icons/stars.png" class="btn-overlay stars-button" onclick="thanks()">
            
                <img src="assets/plus-icon.png" class="image-button" onclick="handleOrder()">
            </div>
        </div>
        
    </div>
    
    <div id="chef-popup" style="display: none; position: fixed; top: 20%; right: 10%; z-index: 10000;">
        <img id="tip-image" src="" style="width: 150px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <button onclick="closeChefTip()" style="display: block; margin-top: 5px;">Kapat</button>
    </div>
    
    <script src="script.js"></script>

    <div class="cart-container-siparis" onclick="showCartDetails()">
        <div class="fixed-cart">
            <img src="assets/icons/cart-icon.png" alt="Cart">
            <span id="cart-count">0</span>
        </div>
    </div>
    
</body>
</html>
